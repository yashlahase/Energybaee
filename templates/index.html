<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Load Calculator Automation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Solar Load Automation</h1>
            <p class="subtitle">Extract data from electricity bills and generate solar load reports instantly.</p>

            <div id="upload-section">
                <div class="upload-zone" id="drop-zone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Drag and drop your electricity bills (PDF/Image) here</p>
                    <p style="font-size: 0.8rem; color: #64748b;">You can select multiple bills to compare</p>
                    <input type="file" id="file-input" class="hidden" accept="image/*,.pdf" multiple>
                </div>
            </div>

            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p id="loader-text">AI is processing your bills...</p>
            </div>

            <div id="result-section">
                <h3 style="text-align: center; margin-bottom: 1rem;">Extracted Data</h3>
                <div id="consumers-container" style="display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center;">
                    <!-- Dynamic consumer grids will be injected here -->
                </div>

                <div style="text-align: center; margin-top: 3rem; display: flex; justify-content: center; gap: 1rem;">
                    <button class="btn" id="generate-btn">
                        <i class="fas fa-file-excel"></i> Generate & Download
                    </button>
                    <button class="btn" id="back-btn" style="background: rgba(255,255,255,0.1); color: white;">
                        <i class="fas fa-undo"></i> Process Another
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const uploadSection = document.getElementById('upload-section');
        const resultSection = document.getElementById('result-section');
        const consumersContainer = document.getElementById('consumers-container');
        const generateBtn = document.getElementById('generate-btn');
        const backBtn = document.getElementById('back-btn');

        let allExtractedData = [];

        dropZone.onclick = () => fileInput.click();
        
        backBtn.addEventListener('click', () => {
            resetUI();
        });

        fileInput.onchange = (e) => {
            const files = e.target.files;
            if (files.length > 0) handleUploads(files);
        };

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
        };

        dropZone.ondragleave = () => {
            dropZone.style.borderColor = 'rgba(255, 255, 255, 0.2)';
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) handleUploads(files);
        };

        async function handleUploads(files) {
            allExtractedData = [];
            uploadSection.classList.add('hidden');
            loader.style.display = 'block';
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                loaderText.innerText = `AI is processing bill ${i+1} of ${files.length}...`;
                
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (data.error) {
                        alert(`Error processing ${file.name}: ${data.error}`);
                        console.error('Error processing file:', file.name, data.error);
                    } else {
                        allExtractedData.push(data);
                    }
                } catch (err) {
                    alert(`Upload failed for ${file.name}: ${err.message}`);
                    console.error('Upload failed for file:', file.name, err.message);
                }
            }

            if (allExtractedData.length > 0) {
                renderData();
            } else {
                resetUI();
            }
        }

        function renderData() {
            loader.style.display = 'none';
            resultSection.style.display = 'block';
            consumersContainer.innerHTML = '';

            allExtractedData.forEach((data, index) => {
                const consumerDiv = document.createElement('div');
                consumerDiv.className = 'consumer-data-block';
                consumerDiv.style.flex = "1";
                consumerDiv.style.minWidth = "400px";
                consumerDiv.style.background = "rgba(255,255,255,0.03)";
                consumerDiv.style.padding = "1.5rem";
                consumerDiv.style.borderRadius = "16px";
                consumerDiv.style.border = "1px solid rgba(255,255,255,0.1)";
                
                consumerDiv.innerHTML = `<h3 style="color: var(--primary); margin-bottom: 1rem;">Consumer ${index + 1}</h3>`;
                
                const grid = document.createElement('div');
                grid.className = 'data-grid';
                grid.style.display = "grid";
                grid.style.gridTemplateColumns = "1fr 1fr";
                grid.style.gap = "10px";
                
                // Show core fields
                const coreFields = [
                    ['consumer_name', 'Name'],
                    ['consumer_number', 'Number'],
                    ['fixed_charges', 'Fixed Charges'],
                    ['sanctioned_load', 'Sanct. Load'],
                    ['connection_type', 'Type']
                ];

                coreFields.forEach(([key, label]) => {
                    const item = document.createElement('div');
                    item.className = 'data-item';
                    item.innerHTML = `
                        <label>${label}</label>
                        <input type="text" value="${data[key] || ''}" data-consumer="${index}" data-key="${key}">
                    `;
                    grid.appendChild(item);
                });
                
                consumerDiv.appendChild(grid);

                // Add History Table Preview
                if (data.consumption_history && data.consumption_history.length > 0) {
                    const historyTitle = document.createElement('h4');
                    historyTitle.innerText = "Consumption History";
                    historyTitle.style.marginTop = "2rem";
                    historyTitle.style.marginBottom = "0.5rem";
                    consumerDiv.appendChild(historyTitle);

                    const tableWrapper = document.createElement('div');
                    tableWrapper.style.overflowX = "auto";
                    
                    const table = document.createElement('table');
                    table.style.width = "100%";
                    table.style.borderCollapse = "collapse";
                    table.style.fontSize = "0.8rem";
                    table.innerHTML = `
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;">
                                <th style="padding: 5px;">Month</th>
                                <th style="padding: 5px;">Units</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.consumption_history.map(h => `
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <td style="padding: 5px;">${h.month || ''}</td>
                                    <td style="padding: 5px;">${h.units || ''}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    `;
                    tableWrapper.appendChild(table);
                    consumerDiv.appendChild(tableWrapper);
                }
                
                consumersContainer.appendChild(consumerDiv);
            });
        }

        function resetUI() {
            loader.style.display = 'none';
            uploadSection.classList.remove('hidden');
            resultSection.style.display = 'none';
            fileInput.value = '';
            allExtractedData = [];
        }

        generateBtn.onclick = async () => {
            // Collect edited data from each consumer block
            const updatedDataList = [];
            
            allExtractedData.forEach((originalData, index) => {
                const updatedConsumer = { ...originalData };
                const inputs = consumersContainer.querySelectorAll(`input[data-consumer="${index}"]`);
                inputs.forEach(input => {
                    updatedConsumer[input.getAttribute('data-key')] = input.value;
                });
                updatedDataList.push(updatedConsumer);
            });

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedDataList)
                });
                const res = await response.json();

                if (res.download_url) {
                    const a = document.createElement('a');
                    a.href = res.download_url;
                    a.download = '';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    alert('Error generating Excel');
                }
            } catch (err) {
                alert('Generation failed');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fas fa-file-excel"></i> Generate & Download';
            }
        };
    </script>
</body>
</html>
